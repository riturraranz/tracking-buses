name: Actualizar GTFS diario

on:
  schedule:
    - cron: '0 10 * * *'  # 5:00 AM Perú (UTC-5)
  workflow_dispatch:

jobs:
  update-gtfs:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Crear carpeta GTFS
        run: mkdir -p GTFS

      - name: ⬇️ Descargar GTFS
        run: |
          curl -L -o GTFS/gtfs.zip "https://vdvlima.utryt.com.co:9015/interfaces/gtfs"

      - name: 📂 Descomprimir GTFS
        run: |
          unzip -o GTFS/gtfs.zip -d GTFS

      - name: 📝 Generar version.json
        run: |
          echo "{\"fecha_descarga\":\"$(date -u +"%Y-%m-%dT%H:%M:%SZ")\"}" > GTFS/version.json

      - name: 📌 Commit y push si hay cambios
        id: commit_step
        run: |
          git config --global user.name "gtfs-bot"
          git config --global user.email "gtfs-bot@users.noreply.github.com"

          git add GTFS/*

          if git diff --cached --quiet; then
            echo "cambios=false" >> $GITHUB_OUTPUT
            echo "Sin cambios"
          else
            git commit -m "Actualización automática GTFS"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:main
            echo "cambios=true" >> $GITHUB_OUTPUT
          fi

      - name: 🚀 Trigger Render Deploy
        if: steps.commit_step.outputs.cambios == 'true'
        run: |
          curl -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
          -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}"