name: Actualizar GTFS

permissions:
  contents: write

on:
  schedule:
    - cron: "0 */6 * * *"   # cada 6 horas (más robusto)
  workflow_dispatch:

jobs:
  update-gtfs:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
         persist-credentials: true

      - name: Descargar GTFS
        run: |
          curl -L -o gtfs.zip https://vdvlima.utryt.com.co:9015/interfaces/gtfs

      - name: Obtener tamaño archivo
        id: fileinfo
        run: |
          echo "size=$(stat -c%s gtfs.zip)" >> $GITHUB_OUTPUT

      - name: Limpiar carpeta GTFS
        run: |
          rm -rf GTFS
          mkdir GTFS

      - name: Descomprimir
        run: |
          unzip -o gtfs.zip -d GTFS

      - name: Generar version.json
        run: |
          echo '{
            "fecha_descarga": "'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'",
            "tamano_bytes": '${{ steps.fileinfo.outputs.size }}'
          }' > GTFS/version.json

      - name: Commit y push
  run: |
    git config --global user.name "gtfs-bot"
    git config --global user.email "gtfs-bot@users.noreply.github.com"

    git add GTFS/*

    if git diff --cached --quiet; then
      echo "Sin cambios"
    else
      git commit -m "Actualización automática GTFS"
      git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:main
    fi