name: Actualizar GTFS

permissions:
  contents: write

on:
  schedule:
    - cron: "0 */6 * * *"   # cada 6 horas
  workflow_dispatch:

jobs:
  update-gtfs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Descargar GTFS
        run: |
          curl -L -o gtfs.zip "https://vdvlima.utryt.com.co:9015/interfaces/gtfs"

      - name: Limpiar carpeta GTFS
        run: |
          rm -rf GTFS
          mkdir GTFS

      - name: Descomprimir GTFS
        run: |
          unzip -o gtfs.zip -d GTFS

      - name: Generar version.json
        run: |
          FECHA=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          printf '{"fecha_descarga":"%s"}' "$FECHA" > GTFS/version.json

      - name: Commit y push
        run: |
          git config --global user.name "gtfs-bot"
          git config --global user.email "gtfs-bot@users.noreply.github.com"

          git add GTFS

          if git diff --cached --quiet; then
            echo "Sin cambios"
          else
            git commit -m "Actualización automática GTFS"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:main
          fi