name: Actualizar GTFS

on:
  schedule:
    - cron: "0 11 * * *"  # 6am Perú (UTC-5)
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-gtfs:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 📦 Instalar dependencias
        run: npm install adm-zip node-fetch@2

      - name: ⬇️ Descargar y descomprimir GTFS
        run: |
          node -e "
          const fs = require('fs');
          const fetch = require('node-fetch');
          const AdmZip = require('adm-zip');

          const url = 'https://vdvlima.utryt.com.co:9015/interfaces/gtfs';

          (async () => {
            const res = await fetch(url);
            const buffer = await res.buffer();

            if (!fs.existsSync('GTFS')) {
              fs.mkdirSync('GTFS');
            }

            fs.writeFileSync('gtfs.zip', buffer);

            const zip = new AdmZip('gtfs.zip');
            zip.extractAllTo('GTFS', true);

            const version = {
              fecha_descarga: new Date().toISOString()
            };

            fs.writeFileSync('GTFS/version.json', JSON.stringify(version, null, 2));

            console.log('GTFS actualizado');
          })();
          "

      - name: 📌 Commit y push si hay cambios
        id: commit_step
        run: |
          git config --global user.name "gtfs-bot"
          git config --global user.email "gtfs-bot@users.noreply.github.com"

          git add GTFS/*

          if git diff --cached --quiet; then
            echo "cambios=false" >> $GITHUB_OUTPUT
            echo "Sin cambios"
          else
            git commit -m "Actualización automática GTFS"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:main
            echo "cambios=true" >> $GITHUB_OUTPUT
          fi