name: Actualizar GTFS

on:
  schedule:
    - cron: "0 11 * * *"  # 6:00 am Perú (UTC-5)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-gtfs:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 📦 Instalar dependencias
        run: npm install adm-zip node-fetch@2

      - name: ⬇️ Descargar y reconstruir GTFS
        run: |
          node -e "
          const fs = require('fs');
          const fetch = require('node-fetch');
          const AdmZip = require('adm-zip');

          const url = 'https://vdvlima.utryt.com.co:9015/interfaces/gtfs';

          (async () => {
            const res = await fetch(url);
            const buffer = await res.buffer();

            // 🔥 Eliminar carpeta anterior completamente
            if (fs.existsSync('GTFS')) {
              fs.rmSync('GTFS', { recursive: true, force: true });
            }

            fs.mkdirSync('GTFS');

            fs.writeFileSync('gtfs.zip', buffer);

            const zip = new AdmZip('gtfs.zip');
            zip.extractAllTo('GTFS', true);

            const version = {
              fecha_descarga: new Date().toISOString()
            };

            fs.writeFileSync(
              'GTFS/version.json',
              JSON.stringify(version, null, 2)
            );

            console.log('✅ GTFS actualizado completamente');
          })();
          "

      - name: 🔍 Verificar contenido del GTFS descargado
        run: |
          echo "📋 Primeras 5 líneas de trips.txt descargado:"
          head -6 GTFS/trips.txt
          echo "📊 Total de líneas:"
          wc -l GTFS/trips.txt

      - name: 📌 Commit y push forzado
        run: |
          git config --global user.name "gtfs-bot"
          git config --global user.email "gtfs-bot@users.noreply.github.com"

          git add -A

          git commit -m "Actualización completa GTFS $(date)" || echo "Sin cambios"

          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:main

      - name: 🚀 Disparar redespliegue en Render
        run: |
          curl -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_WEB_BUS }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_SERVICE_TRACKINGBUSES }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "do_not_clear"}'
          echo "✅ Redespliegue en Render disparado"